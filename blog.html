<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог — HealthOnHand</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="blog.css">
    <script src="script.js" defer></script>
</head>
<body>

<!-- ШАПКА -->
<header class="header">
    <div class="container header__inner">
        <a href="index.html" class="logo">HealthOnHand</a>
        <nav class="nav">
            <a href="index.html">Главная</a>
            <a href="catalog.html">Каталог</a>
            <a href="blog.html" class="active">Блог</a>
            <a href="profile.html">Профиль</a>
        </nav>
        <div class="cart">🛒 <span class="cart-count">0</span></div>
    </div>
</header>

<main>
    <div class="container">
        <!-- Хлебные крошки -->
        <div class="breadcrumbs">
            <a href="index.html">Главная</a> / <span>Блог</span>
        </div>

        <h1 class="section-title">Блог о фитнес-трекерах</h1>
        <p class="blog-subtitle">Полезные статьи, советы и обзоры для тех, кто следит за здоровьем</p>

        <!-- Фильтр категорий -->
        <div class="blog-filters">
            <button class="blog-filter-btn active" data-category="all">Все статьи</button>
            <button class="blog-filter-btn" data-category="reviews">Обзоры</button>
            <button class="blog-filter-btn" data-category="guides">Гайды</button>
            <button class="blog-filter-btn" data-category="tips">Советы</button>
            <button class="blog-filter-btn" data-category="news">Новости</button>
        </div>

        <!-- Сетка статей -->
        <div class="blog-grid" id="blogGrid">
            <!-- Статьи будут загружены через JS -->
        </div>
    </div>
</main>

<!-- ПОДВАЛ -->
<footer class="footer">
    <div class="container">
        <div class="footer__inner">
            <div class="footer__copy">© 2026 HealthOnHand. Все права защищены.</div>
            <div class="footer__links">
                <a href="#">Политика конфиденциальности</a>
                <a href="#">Пользовательское соглашение</a>
            </div>
        </div>
    </div>
</footer>

<!-- POPUP КОРЗИНЫ -->
<div class="cart-popup" id="cartPopup">
    <div class="cart-popup__overlay" id="cartOverlay"></div>
    <div class="cart-popup__content">
        <div class="cart-popup__header">
            <h2>Корзина</h2>
            <button class="cart-popup__close" id="closeCartPopup">✕</button>
        </div>
        <div class="cart-popup__body" id="cartItemsContainer">
            <p class="cart-empty">Корзина пуста</p>
        </div>
        <div class="cart-popup__footer">
            <div class="cart-total">
                <span>Итого:</span>
                <span class="cart-total__amount" id="cartTotalAmount">0 BYN</span>
            </div>
            <button class="btn btn-primary" id="checkoutBtn" style="width: 100%;">Оформить заказ</button>
        </div>
    </div>
</div>

<!-- POPUP СТАТЬИ -->
<div class="article-popup" id="articlePopup">
    <div class="article-popup__overlay" id="articleOverlay"></div>
    <div class="article-popup__content">
        <button class="article-popup__close" id="closeArticlePopup">✕</button>
        <div class="article-popup__body" id="articlePopupBody"></div>
    </div>
</div>


</body>
</html>
